<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR Kessar — Digital Projects Developer</title>
<meta name="description" content="MR Kessar — Professional digital projects developer. Web pages, stores, apps, video ads, automation.">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:hsl(0,0%,100%);--fg:hsl(222,47%,11%);--card:hsl(210,50%,98%);--card-fg:hsl(222,47%,11%);
--primary:hsl(199,89%,48%);--primary-fg:hsl(0,0%,100%);--secondary:hsl(214,95%,93%);
--muted:hsl(210,40%,96%);--muted-fg:hsl(215,16%,47%);--accent:hsl(214,95%,93%);
--border:hsl(214,32%,91%);--glow:199,89%,48%;--radius:0.75rem;
}
.dark{
--bg:hsl(222,71%,4%);--fg:hsl(210,40%,98%);--card:hsl(222,50%,8%);--card-fg:hsl(210,40%,98%);
--primary:hsl(217,91%,40%);--primary-fg:hsl(210,40%,98%);--secondary:hsl(217,33%,17%);
--muted:hsl(217,33%,17%);--muted-fg:hsl(215,20%,65%);--accent:hsl(199,92%,61%);
--border:hsl(217,33%,17%);--glow:199,92%,61%;
}
body{font-family:'Inter','IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
.glass-card{background:color-mix(in srgb,var(--card) 70%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid color-mix(in srgb,var(--border) 50%,transparent);border-radius:1rem;box-shadow:0 8px 32px hsla(var(--glow),.08);transition:box-shadow .3s,transform .3s}
.glass-card:hover{box-shadow:0 12px 40px hsla(var(--glow),.18)}
.btn-primary{display:inline-block;background:var(--primary);color:var(--primary-fg);padding:12px 32px;border-radius:var(--radius);font-weight:600;font-size:.95rem;border:none;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px hsla(var(--glow),.3)}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 8px 30px hsla(var(--glow),.5)}
.btn-outline{display:inline-block;padding:12px 32px;border-radius:var(--radius);font-weight:600;border:1px solid var(--primary);color:var(--primary);background:transparent;cursor:pointer;transition:all .3s}
.btn-outline:hover{background:hsla(var(--glow),.1)}

/* TopBar */
.topbar{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:8px;direction:ltr}
.lang-bar{display:flex;gap:2px;padding:4px;align-items:center}
.lang-btn{padding:4px 8px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted-fg);transition:all .2s}
.lang-btn.active{background:var(--primary);color:var(--primary-fg)}
.theme-btn{padding:8px;border-radius:var(--radius);border:none;cursor:pointer;background:transparent;color:var(--primary);font-size:18px;transition:transform .2s}
.theme-btn:hover{transform:scale(1.1)}

/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 30px hsla(var(--glow),.3)}50%{box-shadow:0 0 60px hsla(var(--glow),.6)}}
@keyframes fade-in-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim-float{animation:float 4s ease-in-out infinite}
.anim-glow{animation:glow-pulse 3s ease-in-out infinite}
.anim-fade{animation:fade-in-up .6s ease-out forwards}

/* Hero */
.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:80px 16px 32px}
.hero-logo{width:140px;height:140px;border-radius:50%;object-fit:contain}
.hero h1{font-size:2.5rem;font-weight:800;margin:16px 0 8px}
.hero .subtitle{font-size:1.1rem;color:var(--primary);font-weight:600;max-width:560px;white-space:pre-line;margin-bottom:12px}
.hero .desc{font-size:.9rem;color:var(--muted-fg);max-width:640px;white-space:pre-line;margin-bottom:24px;line-height:1.7}

/* Services Grid */
.services{max-width:960px;margin:0 auto;padding:0 16px 48px}
.services h2{text-align:center;font-size:1.5rem;font-weight:700;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.service-card{padding:32px 16px;display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer}
.service-card:hover{transform:scale(1.04)}
.service-card .emoji{font-size:2.5rem;margin-bottom:12px}
.service-card .label{font-weight:600;font-size:1.05rem}

/* Page */
.page{min-height:100vh;padding:80px 16px 40px;max-width:900px;margin:0 auto;display:none}
.page.active{display:block}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-weight:600;margin-bottom:32px;cursor:pointer;transition:opacity .2s}
.back-link:hover{opacity:.7}
.page h1{font-size:2.2rem;font-weight:800;margin-bottom:12px}
.page .page-desc{color:var(--muted-fg);font-size:1.05rem;margin-bottom:20px;white-space:pre-line;line-height:1.7}
.page .price-row{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-bottom:24px}
.page .price-main{font-size:1.8rem;font-weight:800;color:var(--primary)}
.page .price-alt{font-size:1.1rem;font-weight:600;color:var(--muted-fg)}
.page .btns{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:40px}
.gallery h2{font-size:1.3rem;font-weight:700;margin-bottom:16px}
.swiper{border-radius:1rem;overflow:hidden; box-shadow:0 8px 32px hsla(var(--glow),.08);}
.swiper-slide{background:color-mix(in srgb,var(--muted) 30%,transparent);display:flex;align-items:center;justify-content:center;min-height:300px; position: relative;}
.swiper-slide img{width:100%;height:100%;object-fit:cover;max-height:600px}
.swiper-slide video{width:100%;max-height:600px; object-fit: cover;}
.swiper-button-next,.swiper-button-prev{color:var(--primary)!important}
.swiper-pagination-bullet-active{background:var(--primary)!important}

/* Payment Popup */
.popup-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:hsla(222,71%,4%,.5);backdrop-filter:blur(4px);animation:fade-in-up .3s;display:none}
.popup-overlay.open{display:flex}
.popup{padding:32px;width:100%;max-width:420px;margin:16px;position:relative}
.popup .close-btn{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted-fg);cursor:pointer;font-size:20px}
.popup h3{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.popup .popup-price{font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:20px}
.method-tabs{display:flex;gap:8px;margin-bottom:20px}
.method-tab{flex:1;padding:8px;border-radius:var(--radius);font-weight:600;font-size:.85rem;border:1px solid var(--border);background:transparent;color:var(--muted-fg);cursor:pointer;transition:all .2s}
.method-tab.active{border-color:var(--primary);background:hsla(var(--glow),.1);color:var(--primary)}
.popup input{width:100%;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:color-mix(in srgb,var(--muted) 50%,transparent);color:var(--fg);margin-bottom:12px;font-size:.9rem;outline:none}
.popup input:focus{box-shadow:0 0 0 2px var(--primary)}
.row-2{display:flex;gap:12px}
.row-2 input:first-child{flex:1}
.row-2 input:last-child{width:100px}

/* Comments */
.comments{max-width:900px;margin:0 auto;padding:0 16px 80px}
.comments h2{font-size:1.3rem;font-weight:700;margin-bottom:20px}
.comment-form{padding:24px;margin-bottom:24px}
.comment-form input,.comment-form textarea{width:100%;padding:12px 16px;border-radius:var(--radius);border:1px solid var(--border);background:color-mix(in srgb,var(--muted) 50%,transparent);color:var(--fg);margin-bottom:12px;font-family:inherit;font-size:.9rem;outline:none;resize:none}
.comment-form input:focus,.comment-form textarea:focus{box-shadow:0 0 0 2px var(--primary)}
.stars-input{display:flex;gap:4px;margin-bottom:12px}
.stars-input span{cursor:pointer;font-size:24px;color:var(--muted-fg);transition:color .15s}
.stars-input span.active{color:#facc15}
.comment-item{padding:20px;margin-bottom:12px}
.comment-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.comment-avatar{width:32px;height:32px;border-radius:50%;background:hsla(var(--glow),.15);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--primary)}
.comment-name{font-weight:600}
.comment-date{font-size:.75rem;color:var(--muted-fg);margin-inline-start:auto}
.comment-stars{display:flex;gap:2px;margin-bottom:6px;font-size:14px; color:#facc15;}
.comment-text{font-size:.9rem;color:color-mix(in srgb,var(--fg) 90%,transparent);line-height:1.6}

@media(min-width:768px){
.hero-logo{width:176px;height:176px}
.hero h1{font-size:3.5rem}
.hero .subtitle{font-size:1.25rem}
.hero .desc{font-size:1rem}
.swiper-slide{min-height:500px}
}
</style>
</head>

// ========== STATE ==========

let dark=localStorage.getItem('theme')==='dark';
let comments=[
  {id:1,name:'Ahmed',text:'عمل رائع ومحترف!',stars:5,date:'2026-03-10'},

// ========== THEME ==========
function applyTheme(){
  document.documentElement.classList.toggle('dark',dark);
  document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'dark':'light');
}
document.getElementById('themeBtn').onclick=()=>{dark=!dark;applyTheme()};
applyTheme();

// ========== LANG ==========
const langs=[{code:'ar',label:'عربي'},{code:'en',label:'EN'},{code:'fr',label:'FR'},{code:'es',label:'ES'}];

function buildLangBar(){
  const bar=document.getElementById('langBar');
  bar.innerHTML='';
  langs.forEach(l=>{
    const b=document.createElement('button');
    b.className='lang-btn'+(l.code===lang?' active':'');
    b.textContent=l.label;
    b.onclick=()=>{lang=l.code;render()};
    bar.appendChild(b);
  });
}

// ========== NAVIGATION & RENDER ==========
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId === 'home' ? 'home' : 'page-' + pageId).classList.add('active');
    window.scrollTo(0,0);
}
